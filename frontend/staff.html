<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MediTrack | Staff & Alerts</title>
  <link rel="icon" type="image/x-icon" href="./veterinary.png">
  <link rel="stylesheet" href="style.css" /> 
  <link rel="stylesheet" href="staff.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Fraunces:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
        </svg>
      </div>
      <span class="logo-text">MediTrack</span>
    </div>

    <nav class="sidebar-nav">
      <a href="index.html" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
        </svg>
        Dashboard
      </a>
      <a href="department.html" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        Departments
      </a>
      <a href="staff.html" class="nav-item active">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
        </svg>
        Staff & Alerts
      </a>
      <a href="upload.html" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="16 16 12 12 8 16"/>
          <line x1="12" y1="12" x2="12" y2="21"/>
          <path d="M20.39 18.39A5 5 0 0018 9h-1.26A8 8 0 103 16.3"/>
        </svg>
        Upload Data
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar">A</div>
        <div>
          <div class="user-name">Admin</div>
          <div class="user-role">Hospital Manager</div>
        </div>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <h1 class="page-title">Staff & Alerts</h1>
        <p class="page-subtitle">Manage personnel allocation and resolve active shortages</p>
      </div>
      <div class="topbar-right">
        <button class="primary-btn" onclick="openReassignModal()">
          + Reassign Staff
        </button>
      </div>
    </header>

    <section class="alerts-section">
      <h2 class="section-title">Action Required: Active Alerts</h2>
      <div class="actionable-alerts-grid" id="activeAlertsGrid">
        </div>
    </section>

    <section class="roster-section">
      <div class="roster-header">
        <h2 class="section-title">Live Staff Roster</h2>
        <div class="roster-controls">
          <input type="text" id="staffSearch" placeholder="Search name or ID..." onkeyup="filterStaff()">
          <select id="deptFilter" onchange="filterStaff()">
            <option value="All">All Departments</option>
            <option value="ICU">ICU</option>
            <option value="Emergency">Emergency</option>
            <option value="General Ward">General Ward</option>
            <option value="Ward B">Ward B</option>
          </select>
        </div>
      </div>

      <div class="table-container">
        <table class="staff-table">
          <thead>
            <tr>
              <th>Staff Member</th>
              <th>Role</th>
              <th>Current Dept</th>
              <th>Shift Status</th>
              <th>Fatigue Level</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="staffTableBody">
            </tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="staff.js"></script>
</body>
</html>
